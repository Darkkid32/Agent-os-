# docker-compose.yml — production-style orchestration.
#
# Builds production images locally and runs the platform with:
#   - api        (Fastify, port 4000)
#   - dashboard  (Next.js standalone, port 3000)
#   - postgres   (Phase 2 dependency)
#   - redis      (Phase 2 dependency)
#
# Usage from repo root:
#   docker compose -f docker/docker-compose.yml \
#     --env-file docker/.env.example \
#     up --build
#
# This file must remain reproducible: every secret value defaults to an empty
# string (or a safe placeholder) so the file can be committed.

name: agent-os

x-pnpm-common: &pnpm-common
  restart: unless-stopped
  networks:
    - agent-os-net

services:
  api:
    <<: *pnpm-common
    container_name: agent-os-api
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
      target: production
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      LOG_LEVEL: info
      DATABASE_URL: ${DATABASE_URL:-postgres://agent_os:agent_os@postgres:5432/agent_os}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-30000}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  dashboard:
    <<: *pnpm-common
    container_name: agent-os-dashboard
    build:
      context: ..
      dockerfile: docker/dashboard.Dockerfile
      target: production
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
    ports:
      - "3000:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    <<: *pnpm-common
    container_name: agent-os-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent_os
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_os}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_os -d agent_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    <<: *pnpm-common
    container_name: agent-os-redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  agent-os-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
